# --- Server ---
# Render (and most PaaS hosts) injects a PORT env var the app must listen on.
server.port=${PORT:8080}

# --- Database (defaults to an in-memory H2 so the app runs with zero setup) ---
# Swap these four lines for Postgres when you're ready - see the commented block below.
spring.datasource.url=jdbc:h2:mem:quizdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Postgres (uncomment and fill in for a real deployment) ---
# spring.datasource.url=jdbc:postgresql://localhost:5432/quizdb
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=quizapp
# spring.datasource.password=changeme

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- CORS: origin(s) allowed to call this API (the Vue dev server by default) ---
quiz.cors.allowed-origins=http://localhost:5173

# --- Mail (fill in with real SMTP credentials to enable "email me the quiz") ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
quiz.mail.from=your-email@gmail.com

# --- Auth ---
# JWT signing secret - MUST be overridden with a long random value (32+ bytes) in any real deployment.
# e.g. generate one with: openssl rand -base64 48
app.jwt.secret=CHANGE-THIS-TO-A-LONG-RANDOM-SECRET-BEFORE-DEPLOYING-1234567890
app.jwt.expiration-minutes=720

# Google OAuth "Web application" client ID (from Google Cloud Console -> APIs & Services -> Credentials).
# This must match the client ID configured on the frontend (VITE_GOOGLE_CLIENT_ID).
app.google.client-id=REPLACE_WITH_YOUR_GOOGLE_OAUTH_CLIENT_ID.apps.googleusercontent.com

# Seeded automatically on first startup if no admin exists yet. Change the password immediately
# (either here before first boot, or later directly in the admin_users table) - this is a
# separate credential store from regular users and is never exposed through the Google login flow.
app.admin.default-username=admin
app.admin.default-password=changeme123
