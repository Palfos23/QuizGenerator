# Activated on Render via the SPRING_PROFILES_ACTIVE=prod environment variable.
# Every value here comes from an env var you set in the Render dashboard - nothing
# sensitive is hardcoded, and nothing here needs to match what's in application.properties
# (which stays as the zero-setup local-dev defaults).

# --- Database: point this at your Neon or Supabase connection string ---
# Neon/Supabase give you a single connection string like:
#   postgresql://user:password@host/dbname?sslmode=require
# Spring's JDBC driver wants the jdbc: prefix, so set DATABASE_URL to:
#   jdbc:postgresql://host/dbname?sslmode=require&user=user&password=password
# (or keep user/password separate via DATABASE_USERNAME / DATABASE_PASSWORD below -
# whichever your provider's copy-paste connection string gives you most easily).
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Set explicitly so Hibernate skips its own "probe the DB to guess the dialect" step.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 console has no purpose against a real Postgres datasource - fully disabled in prod.
spring.h2.console.enabled=false

# Keep ddl-auto=update for now (matches the dev profile) - see the README note about
# switching to Flyway/Liquibase once the schema stabilizes.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- CORS: comma-separated list, e.g. https://your-user.github.io ---
quiz.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# --- Auth ---
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:720}
app.google.client-id=${GOOGLE_CLIENT_ID}
app.admin.default-username=${ADMIN_DEFAULT_USERNAME:admin}
app.admin.default-password=${ADMIN_DEFAULT_PASSWORD}
