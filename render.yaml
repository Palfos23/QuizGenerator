services:
  - type: web
    name: quiz-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/quiz-backend-1.0.0.jar
    healthCheckPath: /api/quiz/categories
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # --- Fill these in via the Render dashboard (Environment tab) after the first deploy -
      # they're intentionally not committed here since most are secrets. ---
      - key: DATABASE_URL          # jdbc:postgresql://<neon-or-supabase-host>/<db>?sslmode=require
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS  # e.g. https://<your-username>.github.io
        sync: false
      - key: JWT_SECRET            # generate with: openssl rand -base64 48
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_DEFAULT_USERNAME
        value: admin
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
